<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="demo"></p>
    <script>
        let i=0;
        let text=""
        // condition and statement and increment
        while(i<=10){
            text+="the number is "+i+"<br>"
            i++
            document.getElementById('demo').innerHTML=text
        }
        
    </script>
</body>
</html>
