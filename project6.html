<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .modal-overplay{
        display: none;
        position: fixed;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
    }
    .modal-overplay.show{
        display: block;
    }
    .model-box{
        background-color: rgb(239, 239, 239);
        width: 90%;
        max-width: 400px;
        margin: 100px auto;
        border-radius: 10px;
        padding: 20px;
        position: relative;
    }
    .model-close{
        position: relative;
        left: 102%;
        border: none;
        top: -35px;
        font-size: 25px;
        cursor: pointer;
        background:none;

    }
    
</style>
<body style="height: 1000px;">
    <h2>Models pops</h2>
    <button id="openBtn">Open Model</button>
    <div id="modal" class="modal-overplay">
        <div class="model-box">
        <button id="closeBtn" class="model-close">x</button>
        <h3>Hello</h3>
        <p> this is a modal popup.</p>
        </div>
    </div>
    <script>
        const modal=document.getElementById('modal');
        const openBtn=document.getElementById('openBtn');
        const closeBtn=document.getElementById('closeBtn');

        function closeModel(){
            modal.classList.remove('show')
        }
        function openModel(){
            modal.classList.add('show')
        }

        openBtn.addEventListener("click",openModel);
        closeBtn.addEventListener("click",closeModel);

        modal.addEventListener("click",function(event){
            if (event.target === modal){
                closeModel()
            }
        })
        .modal.addEventListener("keydown",function(event){
            if (event.key==='Escape'){
                closeModel();
            }
        })
    </script>
</body>
</html>
