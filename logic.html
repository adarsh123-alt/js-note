    <script>
        let x=11;

            console.log(z)

        let a=5;
        let c=3;
        let b=(a<10 && c<2)
        console.log(b)

        let h=(5==8);
        let f=!(5==8)
        console.log(f,h)
// nullish coalescing operator hai jo agar left ke side value null ya undefine hoga usko right side value return kar dega
        let name=null
        let text="missing"
        let result=name?? text;
        console.log(result)

        let age=5
        let hr=(age<10)?"hello":"welcome" 
        console.log(hr)
