    <script>
        //π (pi)  ke vlaue hai ye

        let marks = 88.5
        console.log(Math.round(marks))
        Math.ceil()

        //Always upar round karta hai. like 4.1 ke liye karoge tb tumko 5 de dega
        console.log(Math.ceil(4.1));
        console.log(Math.ceil(4.9));
        // ye allways down value deta hai 4. kitna bhi point hoga per four number aayega
        console.log(Math.floor(4.9));
        console.log(Math.floor(4.2));
        // decimal part remove karta hai
        console.log(Math.trunc());
        // math.sigh()
        console.log(Math.sign(-4));

        console.log(Math.pow(2, 3))
        console.log(2 ** 3)
        // find to square
        console.log(Math.sqrt(64))
        // 8 answer hoga
        //math.abs
        console.log(Math.abs(-10));
        // nagative to postive mein convert karega
        console.log(Math.sin(90 * Math.PI / 180))
        console.log(Math.sin(30 * Math.PI / 180))
        // min find karna min se
        console.log(
            Math.min(10, 20, 5, 100)
        );
        // max find karna
        console.log(
            Math.max(10, 20, 5, 100)
        );
        // 10 ye value ke 
        console.log(Math.floor(Math.random() * 10) + 1);

        Math.log10()

        //Base 10 logarithm.

        console.log(Math.log10(1000));

        console.log(Math.exp(2));
