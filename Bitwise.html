<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // And
        let x = 5 & 1;
        /*
        5 = 0101
        1 = 0001
        ------------
            0001 = 1 */
        console.log(x)
        // or
        let y = 5 | 1;
        /*
        5 = 0101
        1 = 0001
        ------------
          0101 = 5
        */
        console.log(y)

        // XOR
        let i=5^1;
        /*
        5 = 0101
        1 = 0001
        ------------
         0100 = 4
        */
        console.log(i)
    </script>
</body>

</html>
