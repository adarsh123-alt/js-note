    <script>
        // function Expression mein app function ko varibel and aap usko naam bhi de sakte hai
        // function to make varibel not have function name
        // ; last mein hona chiye kq ke ye ek statement hai
        // this is also anonymous function
        const add = function (a, b) {
            return a + b;
        };

        // call back like function ne  dushere function ko argument ke roop mein work kar raha hai
        function adds(f) {
            return f()
        }
        function sum() {
            console.log(5 + 7)
        }
        adds(sum);
        // function Declarations and function Expression 
        // declaration are hoisting hota hai 
        let sums = addc(2, 3);
        function addc(a, b) {

            return a + b;
        }

        console.log(sum);
